name: Release macOS

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: 20
  PNPM_VERSION: 10.32.1

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Verify tag matches package version
        shell: bash
        run: |
          VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          if [[ "v${VERSION}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}" >&2
            exit 1
          fi
      - name: Prepare Apple notarization key
        shell: bash
        run: |
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          if [[ "${APPLE_API_KEY_CONTENT}" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s\n' "${APPLE_API_KEY_CONTENT}" > "${KEY_PATH}"
          else
            APPLE_API_KEY_CONTENT="${APPLE_API_KEY_CONTENT}" python3 -c 'import base64, os, sys; sys.stdout.buffer.write(base64.b64decode(os.environ["APPLE_API_KEY_CONTENT"]))' > "${KEY_PATH}"
          fi
          chmod 600 "${KEY_PATH}"
          echo "APPLE_API_KEY=${KEY_PATH}" >> "${GITHUB_ENV}"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build app
        run: pnpm build
      - name: Build macOS release artifacts
        run: pnpm exec node ./scripts/run-electron-builder.cjs --mac dmg zip --arm64 --publish never
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
            dist/*.zip.blockmap
            dist/latest-mac.yml
