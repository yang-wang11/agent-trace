appId: com.dvlin.agent-trace
productName: Tracer
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - node_modules/**/*
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
mac:
  icon: resources/icon.icns
  artifactName: Tracer-${version}-${arch}.${ext}
  category: public.app-category.developer-tools
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - dmg
    - zip
dmg:
  background: resources/dmg-background.png
  iconSize: 80
  window:
    width: 660
    height: 400
  contents:
    - x: 190
      y: 210
      type: file
    - x: 470
      y: 210
      type: link
      path: /Applications
win:
  icon: resources/icon.png
  artifactName: Tracer-${version}-${arch}.${ext}
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
linux:
  target:
    - AppImage
artifactName: Tracer-${version}-${arch}.${ext}
publish:
  provider: github
  owner: dvlin-dev
  repo: agent-trace
