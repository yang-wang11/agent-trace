<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <!-- Dark background -->
  <rect width="660" height="400" fill="#141414"/>

  <!-- Subtle grid texture -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5">
    <line x1="0" y1="80" x2="660" y2="80"/>
    <line x1="0" y1="160" x2="660" y2="160"/>
    <line x1="0" y1="240" x2="660" y2="240"/>
    <line x1="0" y1="320" x2="660" y2="320"/>
    <line x1="132" y1="0" x2="132" y2="400"/>
    <line x1="264" y1="0" x2="264" y2="400"/>
    <line x1="396" y1="0" x2="396" y2="400"/>
    <line x1="528" y1="0" x2="528" y2="400"/>
  </g>

  <!-- Decorative trace line across bottom -->
  <polyline
    points="0,340 80,340 110,340 130,310 160,360 190,310 220,360 250,330 290,330 660,330"
    fill="none"
    stroke="#E2822B"
    stroke-width="2"
    stroke-opacity="0.15"
    stroke-linecap="square"
    stroke-linejoin="miter"
  />

  <!-- App name -->
  <text x="330" y="68" text-anchor="middle" fill="#ffffff" font-family="Inter, -apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="18" font-weight="600" letter-spacing="4" opacity="0.9">AGENT TRACE</text>

  <!-- Subtle tagline -->
  <text x="330" y="92" text-anchor="middle" fill="#ffffff" font-family="Inter, -apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="11" font-weight="400" letter-spacing="1" opacity="0.35">Inspect agent traffic</text>

  <!-- Arrow from app position to Applications -->
  <g transform="translate(330, 230)">
    <!-- Arrow line -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#E2822B" stroke-width="2" stroke-opacity="0.5"/>
    <!-- Arrow head -->
    <polygon points="60,-6 72,0 60,6" fill="#E2822B" fill-opacity="0.5"/>
  </g>

  <!-- "Drop here" labels -->
  <text x="190" y="310" text-anchor="middle" fill="#ffffff" font-family="Inter, -apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="11" font-weight="500" opacity="0.3">App</text>
  <text x="470" y="310" text-anchor="middle" fill="#ffffff" font-family="Inter, -apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="11" font-weight="500" opacity="0.3">Applications</text>
</svg>
